name: Release Candidate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run smoke:example:install-browser

      - name: Run release QC
        run: npm run qc

      - name: Upload verified package and evidence
        uses: actions/upload-artifact@v4
        with:
          name: copc-cesium-release-candidate-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            output/package-smoke/*.tgz
            output/renderer-benchmark/*.json
            output/smoothness-benchmark/*.json
            output/playwright/*.png
